<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT 機台稼動率統計系統</title>
    <link rel="stylesheet" href="style.css?v=9">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-microchip"></i> SMT OEE 系統</h3>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="switchPage('daily-record', '每日報工')" id="nav-daily-record"><i class="fas fa-edit"></i> 每日報工</a></li>
            <li><a href="#" onclick="switchPage('statistics', '統計與導出')" id="nav-statistics"><i class="fas fa-chart-pie"></i> 統計與導出</a></li>
            <li><a href="#" onclick="switchPage('basic-settings', '基礎設定')" id="nav-basic-settings" class="active"><i class="fas fa-cog"></i> 基礎設定</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <header>
            <button id="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2 id="page-title">基礎設定</h2>
        </header>

        <div class="content-wrapper">
            
            <div id="daily-record" class="page-section" style="display: none;">
                <div class="section" style="border-top: 4px solid #4a5568;">
                    <h2>1. 生產基本資料 (今日共用)</h2>
                    <div class="form-grid">
                        <div><label>日期</label><input type="date" id="recordDate" onchange="loadRecordsByDate()"></div>
                        <div><label>線別</label><select id="recordLine" onchange="onLineSelectionChange()"><option value="">請先至基礎設定新增</option></select></div>
                        <div>
                            <label>開線時間 (24H)</label>
                            <div class="time-picker"><select id="startHour"></select><span>:</span><select id="startMinute"></select></div>
                        </div>
                        <div>
                            <label>結束時間 (24H)</label>
                            <div class="time-picker"><select id="endHour"></select><span>:</span><select id="endMinute"></select></div>
                        </div>
                    </div>
                </div>

                <div class="section" style="margin-top: 20px; border-top: 4px solid #3182ce;">
                    <h2>2. 新增機台與停機紀錄</h2>
                    <div class="form-grid">
                        <div><label>機台名稱</label><select id="recordMachine"><option value="">請先選擇上方線別</option></select></div>
                        <div>
                            <label>提早結束時間 (選填)</label>
                            <div class="time-picker"><select id="earlyEndHour"></select><span>:</span><select id="earlyEndMinute"></select></div>
                        </div>
                    </div>

                    <div style="background-color: #f7fafc; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <h3 style="margin-top: 0; font-size: 1rem;">機台停機輸入</h3>
                        <div class="input-group">
                            <select id="downtimeReasonSelect" style="flex: 2;"><option value="">請選擇停機項目</option></select>
                            <select id="downtimeHour" style="flex: 1;"></select>
                            <select id="downtimeMinute" style="flex: 1;"></select>
                            <button onclick="addDowntimeToList()">加入停機</button>
                        </div>
                        <table class="data-table">
                            <thead><tr><th>停機項目</th><th>時間 (分鐘)</th><th>操作</th></tr></thead>
                            <tbody id="downtimeTableBody"></tbody>
                        </table>
                        <div class="total-summary">此機台總停機： <span id="totalDowntimeDisplay">0</span> 分鐘</div>
                    </div>

                    <div style="text-align: right; margin-top: 15px;">
                        <button class="save-btn" onclick="submitMachineRecord()"><i class="fas fa-plus-circle"></i> 儲存此機台紀錄</button>
                    </div>
                </div>

                <div class="section" style="margin-top: 20px; border-top: 4px solid #38a169;">
                    <h2>3. 今日已輸入紀錄</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>線別</th><th>機台</th><th>開線~結束</th><th>提早結束</th><th>停機時數</th><th>操作 (編輯/刪除)</th>
                            </tr>
                        </thead>
                        <tbody id="dailyHistoryTable"><tr><td colspan="6" style="text-align:center;">請選擇日期以載入紀錄...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div id="statistics" class="page-section" style="display: none;">
                <div class="section">
                    <h2>條件篩選</h2>
                    <div class="form-grid">
                        <div><label>開始日期</label><input type="date" id="statStartDate"></div>
                        <div><label>結束日期</label><input type="date" id="statEndDate"></div>
                        <div><label>機台 (全部)</label><select id="statMachine"><option value="">全部機台</option></select></div>
                        <div style="display:flex; align-items:end;"><button onclick="queryStatistics()" style="width:100%;"><i class="fas fa-search"></i> 查詢統計</button></div>
                    </div>
                </div>
                <div class="section" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>統計結果</h2>
                        <button class="edit-btn" style="background-color: #38a169;" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> 匯出 EXCEL</button>
                    </div>
                    <div class="stat-cards">
                        <div class="card oee-card"><h3>平均設備稼動率 (OEE)</h3><div id="statOEE">0.0%</div></div>
                        <div class="card downtime-card"><h3>總停機時間</h3><div id="statTotalDowntime">0 分鐘</div></div>
                    </div>
                    <div class="chart-container"><canvas id="downtimeChart"></canvas></div>
                </div>
            </div>

            <div id="basic-settings" class="page-section">
                <div class="container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    
                    <div class="section">
                        <h2><i class="fas fa-network-wired"></i> 線別與機台管理</h2>
                        
                        <div style="background-color: #f7fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                            <label style="font-weight: bold; margin-bottom: 10px; display: block; color: #2c3e50;">1. 選擇或新增線別</label>
                            <div class="input-group">
                                <select id="settingLineSelect" style="flex: 2;" onchange="onSettingLineChange()">
                                    <option value="">請選擇線別...</option>
                                </select>
                                <button class="edit-btn" style="background-color: #ecc94b; color: #744210;" onclick="editSelectedLine()">修改名稱</button>
                                <button class="delete-btn" onclick="deleteSelectedLine()">刪除此線</button>
                            </div>
                            <div class="input-group" style="margin-top: 10px; margin-bottom: 0;">
                                <input type="text" id="newLineName" placeholder="或輸入新線別名稱">
                                <button onclick="addNewLine()" style="background-color: #38a169;">新增線別</button>
                            </div>
                        </div>

                        <div style="background-color: #f7fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <label style="font-weight: bold; margin-bottom: 10px; display: block; color: #2c3e50;">
                                2. 管理 [<span id="currentSettingLineDisplay" style="color:#3182ce;">未選擇</span>] 的專屬機台
                            </label>
                            <div class="input-group">
                                <input type="text" id="newMachineName" placeholder="輸入要綁定在此線的機台名稱">
                                <button onclick="addNewMachineToLine()">新增機台</button>
                            </div>
                            <ul id="settingMachineList" style="margin-bottom: 0;"></ul>
                        </div>
                    </div>

                    <div class="section">
                        <h2><i class="fas fa-exclamation-triangle"></i> 停機項目清單</h2>
                        <div class="input-group">
                            <input type="text" id="reasonName" placeholder="例: 首件、異常排除">
                            <button onclick="addReason()">新增項目</button>
                        </div>
                        <ul id="reasonList"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT 機台稼動率統計系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-microchip"></i> SMT OEE 系統</h3>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="switchPage('daily-record', '每日報工')" id="nav-daily-record"><i class="fas fa-edit"></i> 每日報工</a></li>
            <li><a href="#" onclick="switchPage('statistics', '統計與導出')" id="nav-statistics"><i class="fas fa-chart-pie"></i> 統計與導出</a></li>
            <li><a href="#" onclick="switchPage('basic-settings', '基礎設定')" id="nav-basic-settings" class="active"><i class="fas fa-cog"></i> 基礎設定</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <header>
            <button id="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2 id="page-title">基礎設定</h2>
        </header>

        <div class="content-wrapper">
            
            <div id="daily-record" class="page-section" style="display: none;">
                <h3>每日報工介面開發中...</h3>
                <p>接下來我們將在這裡製作開線、停機時間紀錄表單。</p>
            </div>

            <div id="statistics" class="page-section" style="display: none;">
                <h3>統計與導出介面開發中...</h3>
                <p>這裡未來會放置圓餅圖與 EXCEL 匯出按鈕。</p>
            </div>

            <div id="basic-settings" class="page-section">
                <div class="container">
                    <div class="section">
                        <h2>機台清單</h2>
                        <div class="input-group">
                            <input type="text" id="machineName" placeholder="輸入機台名稱 (例: NXT-III)">
                            <button onclick="addMachine()">新增</button>
                        </div>
                        <ul id="machineList"></ul>
                    </div>

                    <div class="section">
                        <h2>停機項目清單</h2>
                        <div class="input-group">
                            <input type="text" id="reasonName" placeholder="輸入停機項目 (例: 首件、異常排除)">
                            <button onclick="addReason()">新增</button>
                        </div>
                        <ul id="reasonList"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

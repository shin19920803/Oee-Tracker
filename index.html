<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT 機台稼動率統計系統</title>
    <link rel="stylesheet" href="style.css?v=5">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-microchip"></i> SMT OEE 系統</h3>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="switchPage('daily-record', '每日報工')" id="nav-daily-record"><i class="fas fa-edit"></i> 每日報工</a></li>
            <li><a href="#" onclick="switchPage('statistics', '統計與導出')" id="nav-statistics"><i class="fas fa-chart-pie"></i> 統計與導出</a></li>
            <li><a href="#" onclick="switchPage('basic-settings', '基礎設定')" id="nav-basic-settings" class="active"><i class="fas fa-cog"></i> 基礎設定</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <header>
            <button id="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2 id="page-title">基礎設定</h2>
        </header>

        <div class="content-wrapper">
            
            <div id="daily-record" class="page-section" style="display: none;">
                <div class="section">
                    <h2>生產基本資料</h2>
                    <div class="form-grid">
                        <div><label>日期</label><input type="date" id="recordDate"></div>
                        <div><label>線別 (自動記憶)</label><input type="text" id="recordLine" placeholder="例: SMT-1線"></div>
                        <div>
                            <label>機台</label>
                            <select id="recordMachine"><option value="">請先至基礎設定新增</option></select>
                        </div>
                        <div><label>開線時間</label><input type="time" id="startTime"></div>
                        <div><label>結束時間</label><input type="time" id="endTime"></div>
                        <div><label>提早結束時間 (選填)</label><input type="time" id="earlyEndTime"></div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="isRollingBreak">
                            <label for="isRollingBreak">是否輪休 (打勾代表中午不休)</label>
                        </div>
                    </div>
                </div>

                <div class="section" style="margin-top: 20px;">
                    <h2>停機紀錄輸入</h2>
                    <div class="input-group">
                        <select id="downtimeReasonSelect" style="flex: 2; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px;">
                            <option value="">請選擇停機項目</option>
                        </select>
                        <input type="number" id="downtimeDuration" placeholder="時間(分鐘，限5的倍數)" step="5" min="5" style="flex: 1;">
                        <button onclick="addDowntimeToList()">新增停機</button>
                    </div>
                    
                    <table class="data-table">
                        <thead><tr><th>停機項目</th><th>時間 (分鐘)</th><th>操作</th></tr></thead>
                        <tbody id="downtimeTableBody"></tbody>
                    </table>
                    <div class="total-summary">目前總停機時間： <span id="totalDowntimeDisplay">0</span> 分鐘</div>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <button class="save-btn" onclick="submitDailyRecord()"><i class="fas fa-save"></i> 儲存今日報工</button>
                </div>
            </div>

            <div id="statistics" class="page-section" style="display: none;">
                <div class="section">
                    <h2>條件篩選</h2>
                    <div class="form-grid">
                        <div><label>開始日期</label><input type="date" id="statStartDate"></div>
                        <div><label>結束日期</label><input type="date" id="statEndDate"></div>
                        <div>
                            <label>機台 (不選代表全部)</label>
                            <select id="statMachine"><option value="">全部機台</option></select>
                        </div>
                        <div style="display:flex; align-items:end;">
                            <button onclick="queryStatistics()" style="width:100%;"><i class="fas fa-search"></i> 查詢統計</button>
                        </div>
                    </div>
                </div>

                <div class="section" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>統計結果</h2>
                        <button class="edit-btn" style="background-color: #38a169;" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> 匯出 EXCEL</button>
                    </div>
                    
                    <div class="stat-cards">
                        <div class="card oee-card">
                            <h3>平均設備稼動率 (OEE)</h3>
                            <div id="statOEE">0.0%</div>
                        </div>
                        <div class="card downtime-card">
                            <h3>總停機時間</h3>
                            <div id="statTotalDowntime">0 分鐘</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="downtimeChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="basic-settings" class="page-section">
                <div class="container">
                    <div class="section">
                        <h2>機台清單</h2>
                        <div class="input-group">
                            <input type="text" id="machineName" placeholder="輸入機台名稱">
                            <button onclick="addMachine()">新增</button>
                        </div>
                        <ul id="machineList"></ul>
                    </div>

                    <div class="section">
                        <h2>停機項目清單</h2>
                        <div class="input-group">
                            <input type="text" id="reasonName" placeholder="輸入停機項目">
                            <button onclick="addReason()">新增</button>
                        </div>
                        <ul id="reasonList"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
